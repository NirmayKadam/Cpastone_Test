version: "3.9"

x-python-service: &python-service
  env_file:
    - .env.example
  restart: unless-stopped

services:
  api-gateway:
    <<: *python-service
    build:
      context: ./apps/api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  market-data-service:
    <<: *python-service
    build:
      context: .
      dockerfile: apps/market-data-service/Dockerfile
    ports:
      - "8001:8000"
    depends_on:
      - redis
      - timescaledb

  quant-engine:
    <<: *python-service
    build:
      context: ./apps/quant-engine
    ports:
      - "8002:8000"
    depends_on:
      - redis
      - postgres

  ml-service:
    <<: *python-service
    build:
      context: ./apps/ml-service
    ports:
      - "8003:8000"
    depends_on:
      - redis
      - mlflow

  worker-orchestrator:
    <<: *python-service
    build:
      context: ./apps/worker-orchestrator
    ports:
      - "8004:8000"
    depends_on:
      - redis
      - postgres

  frontend:
    env_file:
      - .env.example
    build:
      context: ./apps/frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: metadata
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ticks
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.2
    command: mlflow server --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"

  jaeger:
    image: jaegertracing/all-in-one:1.58
    ports:
      - "16686:16686"
      - "4318:4318"
