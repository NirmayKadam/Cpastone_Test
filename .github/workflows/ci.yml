name: ci

on:
  push:
  pull_request:

jobs:
  verify-phase-scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install market data service test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/market-data-service/requirements.txt
      - name: Verify scaffold
        run: python scripts/verify_phase1.py
      - name: Test market data service
        run: pytest apps/market-data-service/tests
